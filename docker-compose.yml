services:
  postgres:
    image: postgres:16-alpine
    container_name: verifyfuel_postgres
    environment:
      POSTGRES_USER: verifyfuel
      POSTGRES_PASSWORD: verifyfuel123
      POSTGRES_DB: verifyfuel_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verifyfuel"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: verifyfuel_backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://verifyfuel:verifyfuel123@postgres:5432/verifyfuel_db
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
